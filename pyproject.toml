[tool.ruff]
line-length = 120
target-version = "py39"

[tool.ruff.lint]
# https://docs.astral.sh/ruff/rules/
extend-select = [
    "B", # flake8-bugbear
    "I", # isort
]

[tool.ruff.lint.isort]
force-single-line = true
lines-between-types = 1

[tool.pyright]
pythonVersion = "3.9"
extraPaths = ["Meta"]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    "**/.*",
    "**/lit.cfg.py",
]
