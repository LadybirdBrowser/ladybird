<!DOCTYPE html>
<html>
<body style="font: 16px sans-serif; margin: 40px;">
<button type="button">Normal button</button>
<button type="button" disabled>Disabled button</button>
<a href="#k">A link</a>
<input type="text" aria-label="Text field">
<input type="text" aria-label="Readonly text" readonly value="readonly value">
<input type="text" aria-label="Required text" required>
<input type="checkbox" aria-label="Checkbox">
<input type="checkbox" aria-label="Checked checkbox" checked>
<input type="radio" aria-label="Radio">
<textarea aria-label="Text area"></textarea>
<div contenteditable="true" aria-label="Editable div">Editable content</div>
<p>A paragraph that is NOT focusable.</p>
<h1>A heading that is NOT focusable.</h1>
<ul><li>A list item that is NOT focusable.</li></ul>
</body>
</html>
