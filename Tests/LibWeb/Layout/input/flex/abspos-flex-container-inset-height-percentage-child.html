<!DOCTYPE html>
<title>Percentage height SHOULD resolve when abspos flex container height is from top+bottom insets</title>
<style>
    * { margin: 0; padding: 0; }
    html { position: relative; width: 400px; height: 200px; }
    body { display: flex; position: absolute; top: 20px; bottom: 20px; left: 0; width: 100%; }
    .child { height: 50%; width: 100%; }
    .content { height: 40px; width: 50%; }
</style>
<body><div class="child"><div class="content"></div></div></body>
