<!DOCTYPE html>
<title>Percentage main size in abspos flex row container with auto width</title>
<style>
    * { margin: 0; padding: 0; }
    html { position: relative; width: 400px; height: 200px; }
    body { display: flex; flex-direction: row; position: absolute; top: 0; left: 0; height: 100%; }
    .child { width: 50%; height: 100%; }
    .content { width: 60px; height: 50%; }
</style>
<body><div class="child"><div class="content"></div></div></body>
