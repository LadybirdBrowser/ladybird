<!DOCTYPE html>
<title>Percentage min-height should not resolve against content-derived height</title>
<style>
    * { margin: 0; padding: 0; }
    html { position: relative; width: 400px; height: 200px; }
    body { display: flex; position: absolute; top: 0; left: 0; width: 200px; }
    .child { min-height: 50%; width: 100%; }
    .content { height: 20px; width: 50px; }
</style>
<body><div class="child"><div class="content"></div></div></body>
