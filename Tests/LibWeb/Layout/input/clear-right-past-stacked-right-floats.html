<!DOCTYPE html><!-- Two stacked full-width right floats, clear:right should clear past both. -->
<style>
.clearfix:after { display: block; content: " "; clear: right; }
.float { float: right; width: 100%; }
</style><div class="clearfix"><div class="float" style="height: 150px; background: steelblue;"></div><div class="float" style="height: 100px; background: tomato;"></div></div><div id="after" style="height: 10px; background: seagreen;"></div>
