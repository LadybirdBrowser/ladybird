<!DOCTYPE html>
<style>
body {
    margin: 0;
}

.container {
    outline: 1px solid #666;
    width: 600px;
}

.left {
    background: rgba(80, 140, 255, 0.6);
    float: left;
}

.right {
    background: rgba(255, 140, 80, 0.6);
    float: right;
}

.first-left {
    width: 300px;
    height: 40px;
}

.first-right {
    width: 300px;
    height: 40px;
}

.second-left {
    width: 200px;
    height: 30px;
}

.clear {
    clear: both;
    height: 0;
}
</style>
<div class="container"><div class="left first-left"></div><div class="right first-right"></div><div class="left second-left"></div><div class="clear"></div></div>
