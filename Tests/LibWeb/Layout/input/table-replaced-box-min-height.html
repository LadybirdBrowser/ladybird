<!DOCTYPE html>
<html>
<head>
    <title>Fixed Table Layout: Replaced Element Height</title>

        table {
            background-color: fuchsia;
            table-layout: fixed;
            width: 110px;
        }
        img {
            width: 100%;
        }

</head>

    <table>
        <td id="test-data"><img src="../../Assets/120.png"/></td>
    </table>
</body>
</html>
