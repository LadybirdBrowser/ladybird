<!DOCTYPE html>
<style>
.grid {
    display: grid;
    grid-template-columns: 100px;
    justify-items: stretch;
    width: 100px;
}

.table {
    display: table;
}

.cell {
    display: table-cell;
}

.content {
    display: inline-block;
    height: 20px;
    width: 20px;
}
</style>
<div class="grid"><div class="table"><div class="cell"><span class="content"></span></div></div></div>
