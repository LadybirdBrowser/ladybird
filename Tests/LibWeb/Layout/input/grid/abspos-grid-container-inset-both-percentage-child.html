<!DOCTYPE html>
<title>Percentage sizes SHOULD resolve when grid container has both insets</title>
<style>
    * { margin: 0; padding: 0; }
    html { position: relative; width: 400px; height: 200px; }
    body { display: grid; position: absolute; top: 10px; bottom: 10px; left: 20px; right: 20px; }
    .child { width: 50%; height: 50%; }
    .content { width: 30px; height: 20px; }
</style>
<body><div class="child"><div class="content"></div></div></body>
