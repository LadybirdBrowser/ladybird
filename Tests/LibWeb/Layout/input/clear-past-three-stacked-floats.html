<!DOCTYPE html><!-- Three stacked full-width left floats, clear:both should clear past all three. -->
<style>
.clearfix:after { display: block; content: " "; clear: both; }
.float { float: left; width: 100%; }
</style><div class="clearfix"><div class="float" style="height: 100px; background: steelblue;"></div><div class="float" style="height: 200px; background: tomato;"></div><div class="float" style="height: 50px; background: gold;"></div></div><div id="after" style="height: 10px; background: seagreen;"></div>
