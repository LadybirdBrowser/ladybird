<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebAudio: Inspector</title>
  <link rel="stylesheet" href="webaudio.css" />
</head>

<body>
  <header>
    <div class="wrap">
      <h1>LibWeb webaudio</h1>
    </div>
  </header>

  <div class="wrap">
    <div class="grid">
      <section class="panel">
        <div class="hd">
          <div class="pill">
            <span id="stateDot" class="dot"></span><span id="stateText">uninitialized</span>
          </div>
          <div class="btnrow">
            <button id="btnToggle" class="primary">Start</button>
          </div>
        </div>

        <div class="bd">
          <div id="graph" class="graph"></div>

          <div class="status" id="status"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="hd">
          <div>Log</div>
          <div class="pill"><span class="dot" id="logDot"></span><span id="logText">ready</span></div>
        </div>
        <div class="bd">
          <div class="logbox"><pre id="log"></pre></div>
        </div>
      </aside>
    </div>
  </div>

  <script src="webaudio.js"></script>
  <script type="module" src="inspector.js"></script>
</body>

</html>
