<!DOCTYPE html>
<style>
    @font-face {
        font-family: Ahem;
        src: url("../data/fonts/Ahem.ttf");
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font: 20px Ahem;
    }

    ul {
        display: flex;
        gap: 24px;
        list-style: none;
        margin: 20px;
        padding: 0;
    }

    li {
        position: relative;
    }

    a {
        margin: -14px 0 -14px -14px;
        padding: 14px 0 14px 14px;
    }

    a span {
        display: inline-flex;
        margin: 0 16px 0 0;
    }

    .separator {
        position: absolute;
        bottom: 9px;
        left: 100%;
        font-size: 110%;
        line-height: 26px;
    }
</style>
<ul>
    <li><a><span>Tech</span></a><span class="separator">X</span></li>
    <li><a><span>Reviews</span></a><span class="separator">X</span></li>
    <li>Science</li>
</ul>
