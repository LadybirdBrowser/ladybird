<!DOCTYPE html>
<script src="../../include.js"></script>
<script src="structural-matrix.js"></script>
<script>
    test(() => {
        const stressScopes = [
            "document",
            "document-styled-use-shadow",
            "shadow-internal",
            "shadow-host",
            "slotted-default",
            "slotted-named",
            "slotted-shadow-host-default",
            "slotted-shadow-host-named",
            "part-document",
            "part-shadow-host-document",
            "part-shadow-internal",
            "part-shadow-host-internal",
            "part-shadow-ancestor",
            "part-shadow-host-ancestor",
        ];
        const modes = [
            "detached",
            "detached-cold",
        ];

        for (const scope of stressScopes) {
            for (const selectorCase of descendantDirectionMutationCases) {
                for (const mode of modes) {
                    runDescendantStressCase(scope, selectorCase, mode, {
                        suite: "descendant direction",
                        skipDocumentStyledUseShadow: true,
                    });
                }
            }
            for (const selectorCase of descendantLanguageMutationCases) {
                for (const mode of modes) {
                    runDescendantStressCase(scope, selectorCase, mode, {
                        suite: "descendant language",
                        skipDocumentStyledUseShadow: true,
                    });
                }
            }
            for (const selectorCase of inheritedLanguageCases) {
                for (const mode of modes) {
                    if (scope !== "document-styled-use-shadow")
                        runInheritedLanguageStressCase(scope, selectorCase, mode);
                }
            }
        }
    });
</script>
