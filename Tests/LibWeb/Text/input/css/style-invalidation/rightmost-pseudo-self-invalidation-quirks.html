<!DOCTYPE quirks>
<script src="../../include.js"></script>
<script src="structural-matrix.js"></script>
<script>
    function withFixture(testName, cssText, build, mutate, verify) {
        const fixture = makeElement("section");
        document.body.appendChild(fixture);
        const style = addStyle(document.head, cssText);

        try {
            assertEqual(`${testName} document mode`, document.compatMode, "BackCompat");
            const state = build(fixture);
            document.body.offsetWidth;

            resetStyleCounters();
            mutate(state);
            verify(state);
            printPassWithCounters(testName);
        } finally {
            style.remove();
            fixture.remove();
        }
    }

    function withSlottedFixture(testName, cssText, build, mutate, verify) {
        const fixture = makeElement("section");
        document.body.appendChild(fixture);
        const host = makeElement("div");
        fixture.appendChild(host);
        const shadowRoot = host.attachShadow({ mode: "open" });
        shadowRoot.appendChild(document.createElement("slot"));
        addStyle(shadowRoot, cssText);

        try {
            assertEqual(`${testName} document mode`, document.compatMode, "BackCompat");
            const state = build(fixture, host, shadowRoot);
            document.body.offsetWidth;

            resetStyleCounters();
            mutate(state);
            verify(state);
            printPassWithCounters(testName);
        } finally {
            fixture.remove();
        }
    }

    function printObservedResult(testName, target, selector, pseudoElement = "") {
        println(`${testName}: selectorMatches=${target.matches(selector)}, probe=${readProbe(target, pseudoElement)}`);
    }

    function appendCheckbox(parent, options = {}) {
        const input = makeElement("input", {
            className: options.className,
            attributes: {
                type: "checkbox",
                ...(options.attributes || {}),
            },
        });
        input.checked = !!options.checked;
        parent.appendChild(input);
        return input;
    }

    function appendTextInput(parent, options = {}) {
        const input = makeElement("input", {
            className: options.className,
            attributes: options.attributes,
        });
        parent.appendChild(input);
        return input;
    }

                expectedAfter: MATCH,

                selector: "input.foo:checked",
                className: "BAR",

                    return { input, classCase };
