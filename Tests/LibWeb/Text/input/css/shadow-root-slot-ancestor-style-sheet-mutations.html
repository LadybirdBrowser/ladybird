<!DOCTYPE html>
<script src="../include.js"></script>
<div id="host"><span id="slotted">slotted</span></div>
<script>
    test(() => {
        const host = document.getElementById("host");
        const slotted = document.getElementById("slotted");
        const shadowRoot = host.attachShadow({ mode: "open" });
        shadowRoot.innerHTML = `
            <div class="wrapper">
                <slot></slot>
            </div>
        `;

        const sheet = new CSSStyleSheet();
        shadowRoot.adoptedStyleSheets = [sheet];

        println(`before replaceSync: ${getComputedStyle(slotted).color}`);

        sheet.replaceSync(".wrapper { color: rgb(255, 0, 0); }");
        println(`after replaceSync add: ${getComputedStyle(slotted).color}`);

        sheet.deleteRule(0);
        println(`after deleteRule: ${getComputedStyle(slotted).color}`);

        sheet.replaceSync(".wrapper { color: rgb(0, 0, 255); }");
        println(`after replaceSync re-add: ${getComputedStyle(slotted).color}`);

        sheet.disabled = true;
        println(`after disable: ${getComputedStyle(slotted).color}`);

        sheet.disabled = false;
        println(`after re-enable: ${getComputedStyle(slotted).color}`);
    });
</script>
