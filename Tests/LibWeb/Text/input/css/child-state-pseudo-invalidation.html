<style>
    body {
        margin: 0;
    }
    .focus-panel {
        color: rgb(0, 0, 0);
    }
    .focus-panel:focus-within {
        color: rgb(0, 128, 0);
    }
    .focus-pseudo:focus-within::before {
        content: "focus";
        --child-state: focus;
    }
    .hover-panel {
        background-color: rgb(255, 255, 255);
        height: 40px;
        margin: 4px;
        width: 120px;
    }
    .hover-panel:hover {
        background-color: rgb(255, 0, 0);
    }
    .hover-pseudo:hover::before {
        content: "hover";
        --child-state: hover;
    }
    .has-panel {
        color: rgb(0, 0, 0);
    }
    .has-panel:has(.has-child) {
        color: rgb(0, 128, 0);
    }
    .has-pseudo:has(.has-child)::before {
        content: "has";
        --child-state: has;
    }
    .empty-panel {
        color: rgb(0, 0, 0);
    }
    .empty-panel:empty {
        color: rgb(0, 128, 0);
    }
    .not-empty-panel {
        color: rgb(0, 0, 0);
    }
    .not-empty-panel:not(:empty) {
        color: rgb(0, 128, 0);
    }
    textarea {
        color: rgb(0, 0, 0);
    }
    textarea:placeholder-shown {
        color: rgb(0, 128, 0);
    }
    #placeholder-pseudo:placeholder-shown::before {
        content: "placeholder";
        --child-state: placeholder;
    }
    .placeholder-pseudo:placeholder-shown::before {
        content: "placeholder";
        --child-state: placeholder;
    }
    .not-placeholder-pseudo:not(:placeholder-shown)::before {
        content: "not placeholder";
        --child-state: not placeholder;
    }
    #empty-pseudo:empty::before {
        content: "empty";
        --child-state: empty;
    }
    #empty-text-pseudo:empty::before {
        content: "empty text";
        --child-state: empty text;
    }
    .empty-pseudo-state:empty::before {
        content: "empty state";
        --child-state: empty state;
    }
    .not-empty-pseudo-state:not(:empty)::before {
        content: "not empty state";
        --child-state: not empty state;
    }
    #empty-move-target:empty {
        color: rgb(0, 128, 0);
    }
    #dir-auto {
        color: rgb(0, 0, 0);
    }
    #dir-auto:dir(rtl) {
        color: rgb(0, 128, 0);
    }
    #dir-pseudo:dir(rtl)::before {
        content: "rtl";
        --child-state: rtl;
    }
    #dir-auto-back {
        color: rgb(0, 0, 0);
    }
    #dir-auto-back:dir(ltr) {
        color: rgb(0, 128, 0);
    }
    #dir-pseudo-back:dir(ltr)::before {
        content: "ltr";
        --child-state: ltr;
    }
    .validity-panel {
        color: rgb(0, 0, 0);
    }
    .validity-panel:invalid {
        color: rgb(255, 0, 0);
    }
    .validity-panel:valid {
        color: rgb(0, 128, 0);
    }
    .invalid-pseudo-state:invalid::before {
        content: "invalid";
        --child-state: invalid;
    }
    .valid-pseudo-state:valid::before {
        content: "valid";
        --child-state: valid;
    }
    #invalid-pseudo-form:invalid::before {
        content: "invalid";
        --child-state: invalid;
    }
    #valid-pseudo-form:valid::before {
        content: "valid";
        --child-state: valid;
    }
    #invalid-pseudo-fieldset:invalid::before {
        content: "invalid fieldset";
        --child-state: invalid fieldset;
    }
    #valid-pseudo-fieldset:valid::before {
        content: "valid fieldset";
        --child-state: valid fieldset;
    }
    #user-invalid-select {
        color: rgb(0, 0, 0);
    }
    #user-invalid-select:user-invalid {
        color: rgb(255, 0, 0);
    }
    .user-invalid-panel {
        color: rgb(0, 0, 0);
    }
    .user-invalid-panel:user-invalid {
        color: rgb(255, 0, 0);
    }
    .user-valid-panel {
        color: rgb(0, 0, 0);
    }
    .user-valid-panel:user-valid {
        color: rgb(0, 128, 0);
    }
    #user-invalid-pseudo-select:user-invalid::before {
        content: "user invalid";
        --child-state: user invalid;
    }
    #user-valid-pseudo-select:user-valid::before {
        content: "user valid";
        --child-state: user valid;
    }
    .user-invalid-pseudo-state:user-invalid::before {
        content: "user invalid";
        --child-state: user invalid;
    }
    .user-valid-pseudo-state:user-valid::before {
        content: "user valid";
        --child-state: user valid;
    }
</style>

<script>
    function color(id) {
        return elementColor(document.getElementById(id));
    }

    function pseudoContent(id) {
        return getComputedStyle(document.getElementById(id), "::before").content;
    }

    function pseudoState(id) {
        return elementPseudoState(document.getElementById(id));
    }

    function backgroundColor(id) {
        return getComputedStyle(document.getElementById(id)).backgroundColor;
    }

    function elementColor(element) {
        return getComputedStyle(element).color;
    }

    function elementPseudoState(element) {
        return getComputedStyle(element, "::before").getPropertyValue("--child-state").trim()
            || "none";
    }

    function createShadowHost(id, styleText) {
        const host = document.createElement("div");
        host.id = id;
        document.body.appendChild(host);
        const shadowContents = `<style>:host { color: rgb(0, 0, 0); } ${styleText}</style><slot></slot>`;
        host.attachShadow({ mode: "open" }).innerHTML = shadowContents;
        return host;
    }

    function submitAndStabilize(formId, controlId, submitId) {
        const form = document.getElementById(formId);
        const control = document.getElementById(controlId);
        form.addEventListener("submit", event => event.preventDefault());
        document.getElementById(submitId).click();
        // Force one recompute after form submission, so option removal is the invalidation being tested below.
        control.style.borderWidth = "1px";
        return control;
    }

    function hover(element) {
        const rect = element.getBoundingClientRect();
        internals.mouseMove(Math.floor(rect.left + rect.width / 2), Math.floor(rect.top + rect.height / 2));
    }

    test(() => {
        // ===== :focus-within (parent style) =====
        const focusSubtree = document.getElementById("focus-subtree");
        const focusInput = document.getElementById("focus-input");
        const focusNew = document.getElementById("focus-new");
        focusInput.focus();

        println(`focus old before append: ${color("focus-old")}`);
        println(`focus new before append: ${color("focus-new")}`);

        focusNew.appendChild(focusSubtree);

        println(`focus old after append: ${color("focus-old")}`);
        println(`focus new after append: ${color("focus-new")}`);

        focusSubtree.remove();

        println(`focus new after remove: ${color("focus-new")}`);

        const focusMoveButton = document.getElementById("focus-move-button");
        const focusMoveNew = document.getElementById("focus-move-new");
        focusMoveButton.focus();

        println(`focus move old before moveBefore: ${color("focus-move-old")}`);
        println(`focus move new before moveBefore: ${color("focus-move-new")}`);

        focusMoveNew.moveBefore(focusMoveButton, null);

        println(`focus move old after moveBefore: ${color("focus-move-old")}`);
        println(`focus move new after moveBefore: ${color("focus-move-new")}`);

        const focusFragmentButton = document.getElementById("focus-fragment-button");
        const focusFragmentNew = document.getElementById("focus-fragment-new");
        focusFragmentButton.focus();

        println(`focus fragment old before append: ${color("focus-fragment-old")}`);
        println(`focus fragment new before append: ${color("focus-fragment-new")}`);

        const focusFragment = document.createDocumentFragment();
        focusFragment.appendChild(focusFragmentButton);
        focusFragmentNew.appendChild(focusFragment);

        println(`focus fragment old after append: ${color("focus-fragment-old")}`);
        println(`focus fragment new after append: ${color("focus-fragment-new")}`);

        // ===== :focus-within (pseudo-element) =====
        const focusPseudoSubtree = document.getElementById("focus-pseudo-subtree");
        const focusPseudoInput = document.getElementById("focus-pseudo-input");
        const focusPseudoNew = document.getElementById("focus-pseudo-new");
        focusPseudoInput.focus();

        println(`focus pseudo old before append: ${pseudoState("focus-pseudo-old")}`);
        println(`focus pseudo new before append: ${pseudoState("focus-pseudo-new")}`);

        focusPseudoNew.appendChild(focusPseudoSubtree);

        println(`focus pseudo old after append: ${pseudoState("focus-pseudo-old")}`);
        println(`focus pseudo new after append: ${pseudoState("focus-pseudo-new")}`);

        focusPseudoSubtree.remove();

        println(`focus pseudo new after remove: ${pseudoState("focus-pseudo-new")}`);

        const focusPseudoMoveButton = document.getElementById("focus-pseudo-move-button");
        const focusPseudoMoveNew = document.getElementById("focus-pseudo-move-new");
        focusPseudoMoveButton.focus();

        println(`focus pseudo move old before moveBefore: ${pseudoState("focus-pseudo-move-old")}`);
        println(`focus pseudo move new before moveBefore: ${pseudoState("focus-pseudo-move-new")}`);

        focusPseudoMoveNew.moveBefore(focusPseudoMoveButton, null);

        println(`focus pseudo move old after moveBefore: ${pseudoState("focus-pseudo-move-old")}`);
        println(`focus pseudo move new after moveBefore: ${pseudoState("focus-pseudo-move-new")}`);

        document.getElementById("focus-pseudo-move-old").moveBefore(focusPseudoMoveButton, null);

        println(`focus pseudo move old after moveBefore back: ${pseudoState("focus-pseudo-move-old")}`);
        println(`focus pseudo move new after moveBefore back: ${pseudoState("focus-pseudo-move-new")}`);

        const focusPseudoFragmentButton = document.getElementById("focus-pseudo-fragment-button");
        const focusPseudoFragmentNew = document.getElementById("focus-pseudo-fragment-new");
        focusPseudoFragmentButton.focus();

        println(`focus pseudo fragment old before append: ${pseudoState("focus-pseudo-fragment-old")}`);
        println(`focus pseudo fragment new before append: ${pseudoState("focus-pseudo-fragment-new")}`);

        const focusPseudoFragment = document.createDocumentFragment();
        focusPseudoFragment.appendChild(focusPseudoFragmentButton);
        focusPseudoFragmentNew.appendChild(focusPseudoFragment);

        println(`focus pseudo fragment old after append: ${pseudoState("focus-pseudo-fragment-old")}`);
        println(`focus pseudo fragment new after append: ${pseudoState("focus-pseudo-fragment-new")}`);

        document.getElementById("focus-pseudo-fragment-old").moveBefore(focusPseudoFragmentButton, null);

        println(`focus pseudo fragment old after moveBefore back: ${pseudoState("focus-pseudo-fragment-old")}`);
        println(`focus pseudo fragment new after moveBefore back: ${pseudoState("focus-pseudo-fragment-new")}`);

        // ===== :host(:focus-within) (shadow pseudo-element) =====
        const shadowFocusPseudoOld = createShadowHost(
            "shadow-focus-pseudo-old",
            `:host(:focus-within)::before { content: "shadow focus"; --child-state: shadow focus; }`);
        const shadowFocusPseudoNew = createShadowHost(
            "shadow-focus-pseudo-new",
            `:host(:focus-within)::before { content: "shadow focus"; --child-state: shadow focus; }`);
        const shadowFocusPseudoSubtree = document.createElement("div");
        const shadowFocusPseudoInput = document.createElement("input");
        shadowFocusPseudoSubtree.appendChild(shadowFocusPseudoInput);
        shadowFocusPseudoOld.appendChild(shadowFocusPseudoSubtree);
        shadowFocusPseudoInput.focus();

        println(`shadow focus pseudo old before append: ${elementPseudoState(shadowFocusPseudoOld)}`);
        println(`shadow focus pseudo new before append: ${elementPseudoState(shadowFocusPseudoNew)}`);

        shadowFocusPseudoNew.appendChild(shadowFocusPseudoSubtree);

        println(`shadow focus pseudo old after append: ${elementPseudoState(shadowFocusPseudoOld)}`);
        println(`shadow focus pseudo new after append: ${elementPseudoState(shadowFocusPseudoNew)}`);

        shadowFocusPseudoSubtree.remove();

        println(`shadow focus pseudo new after remove: ${elementPseudoState(shadowFocusPseudoNew)}`);

        const shadowFocusPseudoMoveOld = createShadowHost(
            "shadow-focus-pseudo-move-old",
            `:host(:focus-within)::before { content: "shadow focus"; --child-state: shadow focus; }`);
        const shadowFocusPseudoMoveNew = createShadowHost(
            "shadow-focus-pseudo-move-new",
            `:host(:focus-within)::before { content: "shadow focus"; --child-state: shadow focus; }`);
        const shadowFocusPseudoMoveButton = document.createElement("button");
        shadowFocusPseudoMoveOld.appendChild(shadowFocusPseudoMoveButton);
        shadowFocusPseudoMoveButton.focus();

        println(`shadow focus pseudo move old before moveBefore: ${elementPseudoState(shadowFocusPseudoMoveOld)}`);
        println(`shadow focus pseudo move new before moveBefore: ${elementPseudoState(shadowFocusPseudoMoveNew)}`);

        shadowFocusPseudoMoveNew.moveBefore(shadowFocusPseudoMoveButton, null);

        println(`shadow focus pseudo move old after moveBefore: ${elementPseudoState(shadowFocusPseudoMoveOld)}`);
        println(`shadow focus pseudo move new after moveBefore: ${elementPseudoState(shadowFocusPseudoMoveNew)}`);

        shadowFocusPseudoMoveOld.moveBefore(shadowFocusPseudoMoveButton, null);

        println(`shadow focus pseudo move old after moveBefore back: ${elementPseudoState(shadowFocusPseudoMoveOld)}`);
        println(`shadow focus pseudo move new after moveBefore back: ${elementPseudoState(shadowFocusPseudoMoveNew)}`);

        const shadowFocusPseudoFragmentOld = createShadowHost(
            "shadow-focus-pseudo-fragment-old",
            `:host(:focus-within)::before { content: "shadow focus"; --child-state: shadow focus; }`);
        const shadowFocusPseudoFragmentNew = createShadowHost(
            "shadow-focus-pseudo-fragment-new",
            `:host(:focus-within)::before { content: "shadow focus"; --child-state: shadow focus; }`);
        const shadowFocusPseudoFragmentButton = document.createElement("button");
        shadowFocusPseudoFragmentOld.appendChild(shadowFocusPseudoFragmentButton);
        shadowFocusPseudoFragmentButton.focus();

        println(`shadow focus pseudo fragment old before append: ${elementPseudoState(shadowFocusPseudoFragmentOld)}`);
        println(`shadow focus pseudo fragment new before append: ${elementPseudoState(shadowFocusPseudoFragmentNew)}`);

        const shadowFocusPseudoFragment = document.createDocumentFragment();
        shadowFocusPseudoFragment.appendChild(shadowFocusPseudoFragmentButton);
        shadowFocusPseudoFragmentNew.appendChild(shadowFocusPseudoFragment);

        println(`shadow focus pseudo fragment old after append: ${elementPseudoState(shadowFocusPseudoFragmentOld)}`);
        println(`shadow focus pseudo fragment new after append: ${elementPseudoState(shadowFocusPseudoFragmentNew)}`);

        shadowFocusPseudoFragmentOld.moveBefore(shadowFocusPseudoFragmentButton, null);

        println(`shadow focus pseudo fragment old after moveBefore back: ${elementPseudoState(shadowFocusPseudoFragmentOld)}`);
        println(`shadow focus pseudo fragment new after moveBefore back: ${elementPseudoState(shadowFocusPseudoFragmentNew)}`);

        // ===== :hover (parent style) =====
        const hoverSubtree = document.getElementById("hover-subtree");
        const hoverNew = document.getElementById("hover-new");
        hover(hoverSubtree);

        println(`hover old before append: ${backgroundColor("hover-old")}`);
        println(`hover new before append: ${backgroundColor("hover-new")}`);

        hoverNew.appendChild(hoverSubtree);

        println(`hover old after append: ${backgroundColor("hover-old")}`);
        println(`hover new after append: ${backgroundColor("hover-new")}`);

        hoverSubtree.remove();

        println(`hover new after remove: ${backgroundColor("hover-new")}`);

        const hoverMoveSubtree = document.getElementById("hover-move-subtree");
        const hoverMoveNew = document.getElementById("hover-move-new");
        hover(hoverMoveSubtree);

        println(`hover move old before moveBefore: ${backgroundColor("hover-move-old")}`);
        println(`hover move new before moveBefore: ${backgroundColor("hover-move-new")}`);
