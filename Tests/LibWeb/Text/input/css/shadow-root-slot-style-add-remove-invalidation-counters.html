<!DOCTYPE html>
<script src="../include.js"></script>
<div id="host-a"><span class="item">target</span></div>
<div id="host-b"><span class="item">other host target</span></div>
<script>
    function settleAndReset(triggerElement) {
        getComputedStyle(triggerElement).color;
        getComputedStyle(triggerElement).color;
        internals.resetStyleInvalidationCounters();
    }

    function verifyInvalidationsStayBounded(label, maxInvalidations) {
        const invalidations = internals.getStyleInvalidationCounters().styleInvalidations;
        if (invalidations <= maxInvalidations)
            println(`PASS: ${label}`);
        else
            println(`FAIL: ${label} (${invalidations} invalidations)`);
    }

    function attachSlotShadowRoot(host) {
        const shadowRoot = host.attachShadow({ mode: "open" });
        shadowRoot.innerHTML = "<slot></slot>";
        return shadowRoot;
    }

    test(() => {
        const hostA = document.getElementById("host-a");
        const target = hostA.firstElementChild;
        const hostB = document.getElementById("host-b");

        for (let i = 0; i < 25; ++i) {
            const bystander = document.createElement("span");
            bystander.className = "item";
            bystander.textContent = `bystander ${i}`;
            document.body.appendChild(bystander);
        }

        const shadowRootA = attachSlotShadowRoot(hostA);
        attachSlotShadowRoot(hostB);

        const shadowStyle = document.createElement("style");
        shadowStyle.textContent = "::slotted(.item) { color: rgb(0, 0, 255); }";

        settleAndReset(target);
        shadowRootA.appendChild(shadowStyle);
        getComputedStyle(target).color;
        verifyInvalidationsStayBounded("slotted stylesheet add ignores matching bystanders outside the current host", 4);

        settleAndReset(target);
        shadowStyle.remove();
        getComputedStyle(target).color;
        verifyInvalidationsStayBounded("slotted stylesheet remove ignores matching bystanders outside the current host", 4);
    });
</script>
