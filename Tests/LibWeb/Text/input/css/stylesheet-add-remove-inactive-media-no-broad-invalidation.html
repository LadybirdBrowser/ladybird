<!DOCTYPE html>
<script src="../include.js"></script>
<div id="target">target</div>
<script>
    function settleAndReset(triggerElement) {
        getComputedStyle(triggerElement).color;
        getComputedStyle(triggerElement).color;
        internals.resetStyleInvalidationCounters();
    }

    function verifyNoFullRestyleWasScheduled(label) {
        const invalidations = internals.getStyleInvalidationCounters().fullStyleInvalidations;
        if (invalidations === 0)
            println(`PASS: ${label}`);
        else
            println(`FAIL: ${label} (${invalidations} full invalidations)`);
    }

    test(() => {
        const target = document.getElementById("target");
        settleAndReset(target);

        const inactiveStyle = document.createElement("style");
        // This sheet still contains a non-style rule that would require broad
        // invalidation if it were active, so keeping the counter at zero proves
        // we only consider effective rules after media evaluation.
        inactiveStyle.media = "print";
        inactiveStyle.textContent = "@layer B, A;";
        document.head.appendChild(inactiveStyle);

        getComputedStyle(target).color;
        verifyNoFullRestyleWasScheduled("inactive media stylesheet add does not schedule full restyle");

        settleAndReset(target);
        inactiveStyle.remove();

        getComputedStyle(target).color;
        verifyNoFullRestyleWasScheduled("inactive media stylesheet remove does not schedule full restyle");
    });
</script>
