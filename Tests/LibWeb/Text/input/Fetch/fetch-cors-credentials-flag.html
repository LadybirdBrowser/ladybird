<!DOCTYPE html>
<script src="../include.js"></script>
<script>
    async function hasCookie(resp, cookieName) {
        const body = await resp.json();
        let cookies = (body["Cookie"] ?? [])
            .flatMap(header => header.split(";"))
            .map(cookie => cookie.trim());
        return cookies.some(cookie => cookie.startsWith(cookieName + "="));
    }

    promiseTest(async () => {
        try {
            const httpServer = httpTestServer();
            const token = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
            const cookieName = `testcookie_${token.replace("-", "_")}`;
            const path = `/fetch-cors-credentials-flag-cookie-${token}`;
            const url = await httpServer.createEcho("GET", path, {
                status: 200,
                headers: {
                    "Access-Control-Allow-Origin": location.origin,
                    "Access-Control-Allow-Credentials": "true",
                    "Set-Cookie": `${cookieName}=COOKIE; Path=${path}`,
                },
                reflect_headers_in_body: true,
            });

            let resp = await fetch(url, { credentials: 'omit' });
            if (await hasCookie(resp, cookieName)) {
                println("FAIL - cookie was set");
                return;
            }

            resp = await fetch(url, { credentials: 'include' });
            if (await hasCookie(resp, cookieName)) {
                println("FAIL - cookie was set");
                return;
            }

            resp = await fetch(url, { credentials: 'include' });
            if (!await hasCookie(resp, cookieName)) {
                println("FAIL - cookie was not set");
                return;
            }

            println("PASS");
        } catch (err) {
            println("FAIL - " + err);
        }
    });
</script>
