<script>
    promiseTest(async () => {
        // Wait for all fonts in the document (including the data: URL font) to load.

        println(`img complete: ${img.complete}`);
        println(`img naturalWidth: ${img.naturalWidth}`);
        println(`img naturalHeight: ${img.naturalHeight}`);
