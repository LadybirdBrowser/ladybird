<!DOCTYPE html>
<script src="./include.js"></script>
<body>
    <div class="ad"></div>
</body>
<script>
    test(() => {
        internals.setContentBlockingEnabled(true);
        internals.setContentBlockers("##.ad");

        const target = document.querySelector(".ad");

        println(getComputedStyle(target).display);

        internals.setContentBlockingEnabled(false);
        println(getComputedStyle(target).display);

        internals.setContentBlockingEnabled(true);
        println(getComputedStyle(target).display);

        internals.setContentBlockers("");
        println(getComputedStyle(target).display);
    });
</script>
