<!DOCTYPE html>
<script src="include.js"></script>
<iframe id="a"></iframe>
<iframe id="b"></iframe>
<script>
asyncTest(done => {
    let doneA = false, doneB = false;
    function check() { if (doneA && doneB) done(); }
    function makeContent(id, n) {
        let html = `<h3>${id} ${n}</h3>`;
        if (n % 3 === 0) html += `<iframe></iframe>`;
        if (n % 5 === 0) html += `<frame/>`;
        return html;
    }
    function run(iframe, id, n, max, finish) {
        if (n >= max) { println('PASS'); finish(); return; }
        const blob = new Blob([makeContent(id, n)], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        iframe.onload = () => {
      try {
                iframe.contentDocument;
                URL.revokeObjectURL(url);
            } catch { println('FAIL'); finish(); return; }
            run(iframe, id, n+1, max, finish);
        };
        iframe.src = url;
    }
    run(document.getElementById('a'), 'a', 0, 10, () => { doneA = true; check(); });
    run(document.getElementById('b'), 'b', 0, 10, () => { doneB = true; check(); });
  });
</script>
