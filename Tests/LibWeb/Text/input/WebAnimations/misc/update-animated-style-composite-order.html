<!doctype html>
<script src="../../include.js"></script>
<div id="target"></div>
<script>
    test(() => {
        target.style = "width: 10px; height: 10px";

        for (let i = 1; i <= 32; ++i) {
            const width = `${i * 10}px`;
            const animation = new Animation(
                new KeyframeEffect(target, { width: [width, width] }, 1000),
                document.timeline
            );
            animation.pause();
            animation.currentTime = 500;
        }

        // The last animation should be applied since it has the highest composite order, so the width should be 320px.
        println(getComputedStyle(target).width);
    });
</script>
