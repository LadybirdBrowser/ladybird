<!DOCTYPE html><style>
.box {
    width: 100px;
    height: 100px;
    animation-name: move;
    animation-duration: 2s;
    animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
    animation-iteration-count: 0.1;
    animation-direction: reverse;
}
@keyframes move { from { left: 0 } to { left: 300px } }
</style><div class="box"></div>
