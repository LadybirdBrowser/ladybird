<!DOCTYPE html>
<html>
<body>
    <div aria-label="Named section">
        <p>Content inside a named div.</p>
    </div>
    <div>
        <p>Content inside an unnamed div.</p>
    </div>
    <span aria-label="Named span">Labeled span content</span>
    <span>Unlabeled span content</span>
    <div role="group" aria-label="Explicit group">
        <p>Content inside a group.</p>
    </div>
</body>
</html>
