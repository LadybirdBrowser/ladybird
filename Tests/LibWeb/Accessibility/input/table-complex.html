<!DOCTYPE html>
<html>
<body>
    <table aria-label="Schedule">
        <caption>Weekly Schedule</caption>
        <thead>
            <tr>
                <th>Day</th>
                <th>Morning</th>
                <th>Afternoon</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Monday</td>
                <td>Meeting</td>
                <td>Code review</td>
            </tr>
            <tr>
                <td>Tuesday</td>
                <td>Workshop</td>
                <td>Free</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>2 events</td>
                <td>1 event</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
