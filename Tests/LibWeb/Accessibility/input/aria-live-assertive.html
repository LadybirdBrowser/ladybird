<!DOCTYPE html>
<html>
<body>
    <div aria-live="assertive" aria-label="Errors">
        <p>Critical error occurred.</p>
    </div>
    <div role="alert">
        <p>Session expired.</p>
    </div>
    <div aria-live="polite" aria-label="Updates">
        <p>3 new messages.</p>
    </div>
    <div aria-live="off">
        <p>This should not announce.</p>
    </div>
</body>
</html>
