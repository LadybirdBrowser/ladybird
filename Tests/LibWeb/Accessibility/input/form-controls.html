<!DOCTYPE html>
<html>
<body>
    <form aria-label="Registration">
        <label for="name">Name</label>
        <input type="text" id="name" aria-label="Full name">
        <label for="email">Email</label>
        <input type="email" id="email" aria-label="Email address">
        <input type="checkbox" id="terms" aria-label="Accept terms">
        <label for="terms">I accept the terms</label>
        <input type="radio" name="plan" id="free" aria-label="Free plan">
        <label for="free">Free</label>
        <input type="radio" name="plan" id="pro" aria-label="Pro plan">
        <label for="pro">Pro</label>
        <select aria-label="Country">
            <option>United States</option>
            <option>Canada</option>
        </select>
        <textarea aria-label="Comments"></textarea>
        <button type="submit">Register</button>
        <button type="reset" disabled>Reset</button>
    </form>
</body>
</html>
