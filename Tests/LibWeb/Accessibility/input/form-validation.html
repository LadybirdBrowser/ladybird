<!DOCTYPE html>
<html>
<body>
    <form aria-label="Login">
        <label for="user">Username</label>
        <input type="text" id="user" aria-label="Username" required aria-required="true">
        <label for="pass">Password</label>
        <input type="password" id="pass" aria-label="Password" required aria-required="true">
        <div role="alert" aria-live="assertive" id="error"></div>
        <button type="submit">Log in</button>
    </form>
</body>
</html>
