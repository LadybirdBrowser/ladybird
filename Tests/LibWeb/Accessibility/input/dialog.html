<!DOCTYPE html>
<html>
<body>
    <div role="dialog" aria-label="Confirmation">
        <h2>Are you sure?</h2>
        <p>This action cannot be undone.</p>
        <button>Confirm</button>
        <button>Cancel</button>
    </div>
    <div role="alertdialog" aria-label="Error">
        <p>Something went wrong.</p>
        <button>Dismiss</button>
    </div>
</body>
</html>
