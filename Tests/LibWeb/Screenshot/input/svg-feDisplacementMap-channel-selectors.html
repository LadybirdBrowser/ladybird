<!DOCTYPE html>
<style>
    * { margin: 0; }
    body { background-color: white; }
</style>
<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="displace-rg">
            <feTurbulence baseFrequency="0.05" numOctaves="2" result="turbulence" />
            <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="30" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <filter id="displace-ba">
            <feTurbulence baseFrequency="0.05" numOctaves="2" result="turbulence" />
            <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="30" xChannelSelector="B" yChannelSelector="A" />
        </filter>
    </defs>
    <rect x="0" y="0" width="200" height="200" fill="magenta" filter="url(#displace-rg)" />
    <rect x="200" y="0" width="200" height="200" fill="magenta" filter="url(#displace-ba)" />
</svg>
