[package]
name = "ladybird_gtk_rust"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies.adw]
package = "libadwaita"
version = "0.9.1"
features = ["v1_8"]

[dependencies.gtk]
package = "gtk4"
version = "0.11.2"
features = ["v4_22"]

[build-dependencies]
cbindgen = "0.29"
