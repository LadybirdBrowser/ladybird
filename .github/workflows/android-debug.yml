name: Android Debug APK

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || format('{0}-{1}', github.ref, github.run_number) }}
  cancel-in-progress: true

env:
  # runner.workspace = /home/runner/work/ladybird-android
  # github.workspace = /home/runner/work/ladybird-android/ladybird-android
  LADYBIRD_SOURCE_DIR: ${{ github.workspace }}
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  VCPKG_ROOT: ${{ github.workspace }}/Build/vcpkg

jobs:
  build:
    name: Android Debug APK (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Ubuntu
            runner: ubuntu-24.04
            setup_os: Linux
            cache_os: Linux
            cache_key_extra: Android Debug Ubuntu
            artifact_name: app-debug-ubuntu

    steps:
      # For pull_request events, actions/checkout defaults to github.sha, which
      # is already the synthetic merge commit.
      - uses: actions/checkout@v6.0.2

      # Sets up Clang, CMake, ninja, nasm, Rust, wasm-tools, vcpkg, and all
      # other host-side build prerequisites required by Meta/ladybird.py.
      - name: Set Up Environment
        uses: ./.github/actions/setup
        id: setup
        with:
          os: ${{ matrix.setup_os }}
          arch: 'x86_64'
          toolchain: 'Clang'
          llvm_version: '18'

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6

      # === PREPARE FOR BUILDING ===

      - name: Restore Caches
        uses: ./.github/actions/cache-restore
        id: cache-restore
        with:
          os: ${{ matrix.cache_os }}
          arch: 'Lagom'
          toolchain: 'Clang'
          cache_key_extra: ${{ matrix.cache_key_extra }}
          ccache_path: ${{ env.CCACHE_DIR }}
          vcpkg_cache_path: ${{ github.workspace }}/Build/caches/vcpkg-binary-cache

      - name: Install Android SDK Components
        run: |
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "ndk;29.0.13599879"

      - name: Install Rust Android Targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android

      # === BUILD ===

      - name: Build Android Debug APK
        working-directory: ${{ github.workspace }}/UI/Android
        run: |
          set -o pipefail
          ./gradlew --stacktrace --info assembleDebug 2>&1 | tee "${{ github.workspace }}/android-debug-build.log"
        env:
          GRADLE_OPTS: '-Xmx4096m'
          LADYBIRD_CACHE_DIR: ${{ github.workspace }}/Build/caches

      # === ARTIFACTS ===

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/UI/Android/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Gradle Build Log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-gradle-log-${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/android-debug-build.log
          if-no-files-found: warn

      # === SAVE CACHES ===

      - name: Save Caches
        if: always()
        uses: ./.github/actions/cache-save
        with:
          arch: 'Lagom'
          ccache_path: ${{ env.CCACHE_DIR }}
          ccache_primary_key: ${{ steps.cache-restore.outputs.ccache_primary_key }}
          vcpkg_cache_path: ${{ github.workspace }}/Build/caches/vcpkg-binary-cache
          vcpkg_cache_primary_key: ${{ steps.cache-restore.outputs.vcpkg_cache_primary_key }}
