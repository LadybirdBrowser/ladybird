[package]
name = "libregex_rust"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib", "rlib"]

# After changing dependencies, regenerate the Flatpak sources:
#   python3 Meta/CMake/flatpak/generate-cargo-sources.py
[dependencies]
libunicode_rust = { path = "../../LibUnicode/Rust", default-features = false }

[features]
default = []
allocator = []

[build-dependencies]
cbindgen = "0.29"
